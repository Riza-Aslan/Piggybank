name: Publish Add-on
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Publish
        uses: home-assistant/builder@master
        with:
          args: |
            --all \
            --target piggybank \
            --image ghcr.io/${{ github.repository_owner }}/piggybank-{arch} \
            --docker-hub ghcr.io
